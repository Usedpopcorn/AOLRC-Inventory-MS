default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.2
    hooks:
      - id: ruff
        args: ["--fix", "--no-cache"]
        files: ^(scripts/|tests/|CHECK_SETUP\.py$)

  - repo: local
    hooks:
      - id: repo-validate
        name: repo validate
        entry: python scripts/repo_python.py scripts/validate_repo.py
        language: python
        pass_filenames: false
        stages: [pre-push]

      - id: smoke-tests
        name: smoke tests
        entry: python scripts/repo_python.py -m pytest
        language: python
        pass_filenames: false
        stages: [pre-push]
