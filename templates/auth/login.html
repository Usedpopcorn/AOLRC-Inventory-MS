{% extends "base.html" %}
{% block title %}Sign In{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-sm-10 col-md-8 col-lg-5">
    <div class="card">
      <div class="card-body p-4">
        <h1 class="h4 mb-2 fw-bold text-aolrc-purple page-heading">Sign In</h1>
        <p class="text-muted mb-4">Use your inventory account credentials.</p>

        <form method="post" class="d-flex flex-column gap-3">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
          <div>
            <label class="form-label" for="email">Email</label>
            <input
              class="form-control"
              id="email"
              name="email"
              type="email"
              value="{{ email }}"
              required
              autocomplete="username"
            >
          </div>
          <div>
            <label class="form-label" for="password">Password</label>
            <input
              class="form-control"
              id="password"
              name="password"
              type="password"
              required
              autocomplete="current-password"
            >
          </div>
          <button class="btn btn-aolrc-accent py-2" type="submit">Sign In</button>
        </form>

        {% if quick_login_enabled %}
          <hr class="my-4">
          <div class="small text-muted mb-2">Dev quick login</div>
          <div class="d-flex flex-column flex-sm-row gap-2">
            <form method="post" class="flex-fill">
              <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
              <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
              <input type="hidden" name="quick_login_role" value="admin">
              <button class="btn btn-outline-secondary w-100 py-2" type="submit">Admin</button>
            </form>
            <form method="post" class="flex-fill">
              <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
              <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
              <input type="hidden" name="quick_login_role" value="staff">
              <button class="btn btn-outline-secondary w-100 py-2" type="submit">Staff</button>
            </form>
            <form method="post" class="flex-fill">
              <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
              <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
              <input type="hidden" name="quick_login_role" value="user">
              <button class="btn btn-outline-secondary w-100 py-2" type="submit">View Only</button>
            </form>
          </div>
        {% endif %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
